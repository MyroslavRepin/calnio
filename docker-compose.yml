name: calnio

services:
  backend:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
